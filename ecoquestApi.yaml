openapi: 3.0.3
info:
  title: EcoQuest API
  description: API per il sistema di generazione di missioni urbane sostenibili nella città di Trento.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Server di sviluppo locale
paths:
  /auth/signUp:
    post:
      summary: Registrazione di un nuovo utente o esercente
      description: Crea un nuovo account nel sistema. Il payload richiesto varia a seconda che il campo `type` sia impostato su 'Utente' o 'Esercente'.
      tags:
        - Autenticazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Registrazione effettuata con successo. Restituisce i dati dell'account creato (senza la password).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaResponse'
        '400':
          description: Errore di validazione (campi obbligatori mancanti, tipo di account non valido, o vincoli del modello non rispettati).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflitto. L'email o l'username sono già associati a un altro utente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Errore interno del server durante la registrazione.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login di un utente, esercente o amministratore
      description: Autentica un account esistente tramite email e password. In caso di successo restituisce un token JWT valido per 1 ora.
      tags:
        - Autenticazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login effettuato con successo. Restituisce il token JWT da usare per le richieste autenticate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Errore di validazione. Email o password mancanti.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenziali non valide o token non creato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Errore interno del server durante il login.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/add_POI:
    post:
      summary: Aggiunta di un nuovo Point Of Intereset (POI).
      description: Permette all'ammiinistratore di creare e salvare un nuovo POI nel database.
      tags:
        - POI

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPOIRequest'

      responses:
        '201':
          description: POI creato con successo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/POIResponse'
        
        '400':
          description: Errore di validazione nei dati inseriti.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        
        '409':
          description: Nome o coordinate già associate a un altro POI.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        
        '500':
          description: Errore interno del server durante il salvataggio del POI.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SignUpRequest:
      type: object
      required:
        - type
        - username
        - email
        - password
      properties:
        type:
          type: string
          enum:
            - Utente
            - Esercente
          description: Identifica il ruolo dell'account da creare.
        username:
          type: string
          description: Nome utente (univoco).
        email:
          type: string
          format: email
          description: Indirizzo email dell'utente (univoco).
        password:
          type: string
          format: password
          description: Password in chiaro (verrà criptata con argon2 dal server).
      discriminator:
        propertyName: type
        mapping:
          Utente: '#/components/schemas/UtenteSignUp'
          Esercente: '#/components/schemas/EsercenteSignUp'

    UtenteSignUp:
      type: object
      allOf:
        - $ref: '#/components/schemas/SignUpRequest'
        # Nessun campo aggiuntivo obbligatorio al momento dell'iscrizione per l'Utente

    EsercenteSignUp:
      type: object
      allOf:
        - $ref: '#/components/schemas/SignUpRequest'
      required:
        - nome
        - cognome
        - codiceFiscale
        - partitaIVA
      properties:
        nome:
          type: string
        cognome:
          type: string
        codiceFiscale:
          type: string
          pattern: '^[A-Z]{6}\d{2}[A-Z]\d{2}[A-Z]\d{3}[A-Z]$'
          description: Codice Fiscale valido.
        partitaIVA:
          type: string
          pattern: '^\d{11}$'
          description: Partita IVA composta da 11 cifre.

    PersonaResponse:
      type: object
      properties:
        _id:
          type: string
          description: ID univoco generato da MongoDB.
        type:
          type: string
          enum: [Utente, Esercente]
        username:
          type: string
        email:
          type: string
        # Eventuali altri campi come 'nome', 'cognome', 'codiceFiscale', 'partitaIVA' saranno presenti se type='Esercente'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      description: Dati della persona registrata. Il campo password è volutamente escluso dalla risposta.

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Descrizione user-friendly dell'errore (o un array di stringhe nel caso di ValidationErrors multipli).
        error:
          type: string
          description: Dettaglio tecnico dell'errore (opzionale, presente nei codici 500).
          
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Indirizzo email associato all'account.
        password:
          type: string
          format: password
          description: Password in chiaro dell'account.

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Token JWT firmato dal server. Contiene `userId` e `role` e scade dopo 1 ora.
    
    AddPOIRequest:
      type: object
      required:
        - nome
        - descrizione
        - posizione
        - categoria

      properties:
        nome:
          type: string
          description: Nome univoco del Point Of Interest.

        descrizione:
          type: string
          description: Descrizione del POI.

        posizione:
          type: object
          required:
            - type
            - coordinates
          properties:
            type:
              type: string
              example: Point

            coordinates:
              type: array
              description: Coordinate GeoJSON nel formato [longitudine, latitudine].
              items:
                type: number
              minItems: 2
              maxItems: 2
              example: [11.1217, 46.0679]

        urlImmagini:
          type: array
          description: Lista degli URL delle immagini associate al POI.
          items:
            type: string
        
        categoria:
          type: array
          description: Categorie associate al POI.
          items:
            type: string
            enum: [Cultura, Natura, Sport, Svago, Benessere, Spettacolo, Musica]
        
        meteoCondition:
          type: array
          description: Condizioni meteo adatte per questo POI.
          items:
            type: string

    POIResponse:
      type: object
      properties:
        _id:
          type: string
          description: ID univoco del POI generato da MongoDB.

        nome:
          type: string

        descrizione:
          type: string

        posizione:
          type: object

        urlImmagini:
          type: array
          items:
            type: string

