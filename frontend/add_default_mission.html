<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi Missione Predefinita</title>

    <link rel="stylesheet" href="/css/add.css"> 
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map {
            height: 300px; 
            width: 100%; 
            border-radius: 8px; 
            border: 1px solid #bbd5da;
            margin-bottom: 5px;
            z-index: 1;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .number-marker {
            background-color: #1ea85a;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header id="main-header">
        <div class="header-container">
            <a href="/homepage" class="logo">
                <h1>🌱EcoQuest</h1>
            </a>
            
            <nav class="navbar">
                <ul class="nav-links">
                    <li class="guest-only"><a href="/auth/login" class="nav-item">Accedi</a></li>
                    <li class="guest-only"><a href="/auth/sign_up" class="nav-item">Registrati</a></li>
                    <li class="admin-only"><a href="/admin/add_mission" class="nav-item">Crea Missione</a></li>
                    <li class="admin-only"><a href="/admin/add_POI" class="nav-item">Crea POI</a></li>
                    <li class="user-only"><a href="#" id="logoutBtn" class="nav-item">Gestione Profilo</a></li>
                    <li class="user-only"><a href="#" id="logoutBtn" class="nav-item">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="wrapper">
        <div class="form">
            <h2>Aggiungi Nuova Missione Predefinita</h2>
            
            <form id="missionForm">
                <div class="form-input">
                    <label for="titolo">Titolo Missione*</label>
                    <input type="text" id="titolo" required>
                </div>

                <div class="form-input">
                    <label for="descrizione">Descrizione</label>
                    <textarea id="descrizione" rows="3"></textarea>
                </div>

                <div class="form-input">
                    <label>Traccia i Punti (In ordine di visita)</label>
                    <div id="map"></div>
                    <p class="help-text">Clicca sulla mappa per aggiungere i punti. Verranno numerati in automatico.</p>
                    <button type="button" id="clearMapBtn" style="padding: 5px 10px; border-radius: 5px; border: 1px solid #bbd5da; cursor: pointer;">Cancella Punti</button>
                    <input type="hidden" id="arrayPOI" required>
                </div>

                <div class="form-input">
                    <label for="punti">Punti Ricompensa*</label>
                    <input type="number" id="punti" min="0" placeholder="Es. 100" required>
                </div>

                <div class="form-input">
                    <label for="bonusGamification">Bonus Gamification</label>
                    <input type="number" id="bonusGamification" min="0" placeholder="Es. 1">
                </div>

                <div class="form-input">
                    <label for="risparmioCO2">Risparmio CO2 Stimato (kg)</label>
                    <input type="number" id="risparmioCO2" min="0" step="0.01" placeholder="Es. 2.5">
                </div>

                <div class="form-input">
                    <label for="stato">Stato Iniziale</label>
                    <select id="stato">
                        <option value="DaIniziare" selected>Da Iniziare</option>
                        <option value="InCorso">In Corso</option>
                        <option value="Completata">Completata</option>
                        <option value="InPausa">In Pausa</option>
                        <option value="Annullata">Annullata</option>
                    </select>
                </div>

                <div id="errorMessage"></div>
                
                <button type="submit" id="submitBtn">Salva Missione</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/auth_utils.js"></script>
    <script src="/js/add_default_mission.js"></script>
    <script src="/js/navbar.js"></script>
</body>
</html>
