<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecoquest - Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <header id="main-header">
        <div class="header-container">
            <a href="/poi/view_map" class="logo">
                <h1>🌱EcoQuest</h1>
            </a>
            
            <nav class="navbar">
                <ul class="nav-links">
                    <li><a href="https://www.instagram.com/baignowski/" class="nav-item">Chi Siamo</a></li>
                    <li><a href="" class="nav-item">Accedi</a></li>
                    <li><a href="/auth/signup" class="nav-item">Registrati</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="login-wrapper">
        <h1 class="main-title">EcoQuest</h1>
        <div class="form">
            <h2>Accedi</h2>

            <form id="loginForm">

                <div class="form-input">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <div class="form-input">
                    <label>Password</label>
                    <input type="password" id="password">
                </div>

                <button type="submit" id="submitBtn">
                    Login
                </button>

            </form>

            <span id="errorMessage"></span>

        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
