<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ecoquest - SignUp</title>
    
        <link rel="stylesheet" href="/css/sign_up.css">
    </head>
    <body>

    <header id="main-header">
        <div class="header-container">
            <a href="/poi/view_map" class="logo">
                <h1>🌱EcoQuest</h1>
            </a>
            
            <nav class="navbar">
                <ul class="nav-links">
                    <li><a href="https://www.instagram.com/baignowski/" class="nav-item">Chi Siamo</a></li>
                    <li><a href="/auth/login" class="nav-item">Accedi</a></li>
                    <li><a href="" class="nav-item">Registrati</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="login-wrapper">
        <div class="form">
            <h2>Registrati</h2>
            <form id="signupForm">
                <div class="user-type-switch form-input">
                    <label for="userUtente" id="labelUtente" class="switch-button active">UTENTE</label>
                    <label for="userEsercente" id="labelEsercente" class="switch-button">ESERCENTE</label>
                    <input type="radio" id="userUtente" name="accountType" value="Utente" checked class="hidden-radio">
                    <input type="radio" id="userEsercente" name="accountType" value="Esercente" class="hidden-radio">
                </div>

                <div class="form-input">
                    <label>Username</label>
                    <input type="text" id="username">
                </div>

                <div class="form-input">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <div class="form-input">
                    <label>Password</label>
                    <input type="password" id="password">
                </div>

                <div class="form-input">
                    <label>Ripeti Password</label>
                    <input type="password" id="repeated-password">
                </div>

                <div id="esercenteFields" style="display: none;">
                    <div class="form-input">
                        <label>Nome</label>
                        <input type="text" id="firstName">
                    </div>

                    <div class="form-input">
                        <label>Cognome</label>
                        <input type="text" id="lastName">
                    </div>
                    
                    <div class="form-input">
                        <label>Codice Fiscale</label>
                        <input type="text" id="fiscalCode">
                    </div>

                    <div class="form-input">
                        <label>P. IVA</label>
                        <input type="text" id="pIva">
                    </div>
                </div>

                <button id="submitBtn">Invia</button>
            </form>

            <span id="errorMessage"></span>
        </div>
    </div>

    <script src="/js/sign_up.js"></script>
    </body>
</html>
